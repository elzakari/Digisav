name: digisav
version: "3.9"
services:
  db:
    image: postgres:15-alpine
    container_name: digisav_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-digisav}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-digisavpassword}
      POSTGRES_DB: ${POSTGRES_DB:-digisav}
    volumes:
      - digisav_db_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-digisav}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: digisav_redis
    restart: unless-stopped
    volumes:
      - digisav_redis_data:/data
    command: redis-server --appendonly yes

  backend:
    build:
      context: ./backend
    container_name: digisav_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-digisav}:${POSTGRES_PASSWORD:-digisavpassword}@db:5432/${POSTGRES_DB:-digisav}?schema=public
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-supersecretkey-change-in-production}
      - PORT=3000
    ports:
      - "3000:3000"

  frontend:
    build:
      context: ./frontend
    container_name: digisav_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-5173}:80"

volumes:
  digisav_db_data:
  digisav_redis_data:

x-casaos:
  architectures:
    - amd64
    - arm64
    - arm
  main: frontend
  description:
    en_us: "DigiSav is a premium group savings and micro-investment platform. Manage your collective savings, distribute payouts flexibly, and track compliance using dynamic dashboards."
  tagline: "Modern Group Savings & Investments"
  icon: "https://raw.githubusercontent.com/lucide-icons/lucide/main/icons/piggy-bank.svg"
  developer: "Elzakari"
  author: "Elzakari"
  category: Finance
  port_map: "5173"
  index: /
  title:
    en_us: DigiSav